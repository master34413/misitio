<!DOCTYPE html>
<!--
  ╔══════════════════════════════════════════════════════════════╗
  ║  LOADING PAGE — loadingpage1.html                           ║
  ║  Componente de preloader extraído de paginas-web/index.html ║
  ║                                                             ║
  ║  CÓMO FUNCIONA                                              ║
  ║  1. El script mide la longitud de cada path del SVG y       ║
  ║     asigna stroke-dasharray/offset para poder animarlos.    ║
  ║  2. Se añade la clase .start-animation al #preloader,       ║
  ║     lo que dispara las animaciones CSS:                     ║
  ║     • sketchLine  — dibuja los trazos (2 s)                 ║
  ║     • fillSolid   — rellena el logo de blanco (1 s, delay 2.2 s) ║
  ║     • textReveal  — aparece el label "Apex Creative"        ║
  ║  3. Promise.all espera a que AMBAS condiciones se cumplan:  ║
  ║     • animDone  → 3 200 ms (duración total de la animación) ║
  ║     • pageLoaded → window.load                             ║
  ║  4. Hace fade-out (opacity:0, transición 0.8 s) y lo elimina del DOM. ║
  ║                                                             ║
  ║  INTEGRACIÓN EN index.html                                  ║
  ║  — CSS:  copiar el bloque <style> al <head>                 ║
  ║  — HTML: colocar el <div id="preloader"> al inicio del <body> ║
  ║  — JS:   colocar el <script> al final del <body> (antes de  ║
  ║           los scripts defer de GSAP)                        ║
  ╚══════════════════════════════════════════════════════════════╝
-->
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Page 1 — Apex Creative</title>

  <style>
    /* ─── RESET MÍNIMO para previsualización standalone ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #000; }

    /* ════════════════════════════════════════════════════
       PRELOADER — copiar este bloque al <head> de index.html
       ════════════════════════════════════════════════════ */

    #preloader {
      position: fixed;
      inset: 0;
      background-color: #000000;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s ease;
    }

    .loader-logo-wrapper {
      width: 140px;
      position: relative;
    }

    .loader-svg {
      width: 100%;
      height: auto;
      overflow: visible;
      filter: drop-shadow(0 15px 20px rgba(0, 0, 0, 0.5));
    }

    /* Estado inicial: paths invisibles, listos para animarse */
    .loader-svg path {
      fill: transparent;
      stroke: #ffffff;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .hand-paths path {
      stroke-width: 0.5px;
    }

    .star-wrapper path {
      stroke-width: 1.2px;
    }

    .star-wrapper {
      transform-origin: center;
      transform-box: fill-box;
    }

    /* La clase .start-animation se añade desde JS para disparar todo */
    .start-animation .draw-animate {
      animation:
        sketchLine 2s    cubic-bezier(0.4, 0, 0.2, 1) forwards,
        fillSolid  1s    cubic-bezier(0.4, 0, 0.2, 1) 2.2s forwards;
    }

    /* Etapa 1: dibuja los trazos del SVG */
    @keyframes sketchLine {
      to { stroke-dashoffset: 0; }
    }

    /* Etapa 2: rellena el logo de blanco y borra el trazo */
    @keyframes fillSolid {
      to {
        fill: #ffffff;
        stroke: transparent;
      }
    }

    /* Label "Apex Creative" debajo del logo */
    .loader-text {
      color: #ffffff;
      letter-spacing: 4px;
      font-size: 0.85rem;
      text-transform: uppercase;
      margin-top: 40px;
      opacity: 0;
      transform: translateY(10px);
    }

    .start-animation .loader-text {
      animation: textReveal 1.5s cubic-bezier(0.4, 0, 0.2, 1) 1s forwards;
    }

    @keyframes textReveal {
      to {
        opacity: 0.6;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

       ════════════════════════════════════════════════════ -->

  </div>

  <!-- ════════════════════════════════════════════════════
       JS DEL PRELOADER — copiar al final del <body> en index.html
       (antes de los scripts defer de GSAP)
       ════════════════════════════════════════════════════ -->
  <script>
    (function initPreloader() {
      const preloader = document.getElementById('preloader');
      if (!preloader) return;

      // 1. Medir la longitud total de cada path y configurar
      //    stroke-dasharray / stroke-dashoffset para la animación de dibujo.
      //    Esto debe hacerse desde JS porque las longitudes varían por path.
      const drawPaths = document.querySelectorAll('#preloader .draw-animate');
      drawPaths.forEach(path => {
        const length = path.getTotalLength();
        path.style.strokeDasharray  = length;
        path.style.strokeDashoffset = length;
      });

      // 2. Activar la animación CSS inmediatamente.
      preloader.classList.add('start-animation');

      // 3. Esperar a que AMBAS condiciones se cumplan:
      //    • animDone  → la animación CSS termina (~3 200 ms)
      //    • pageLoaded → window.load (todos los recursos listos)
      //    Así nunca se corta la animación si la red es rápida,
      //    ni se bloquea si es lenta.
      const ANIM_DURATION_MS = 3200; // sketchLine 2s + fillSolid delay 2.2s + 1s

      const animDone   = new Promise(res => setTimeout(res, ANIM_DURATION_MS));
      const pageLoaded = new Promise(res => {
        if (document.readyState === 'complete') res();
        else window.addEventListener('load', res, { once: true });
      });

      Promise.all([animDone, pageLoaded]).then(() => {
        // 4. Fade-out usando la transición CSS ya definida (0.8 s)
        preloader.style.opacity = '0';

        // 5. Eliminar el nodo del DOM y desbloquear el scroll
        setTimeout(() => {
          preloader.remove();
          document.body.classList.remove('overflow-hidden');
          // En index.html aquí se llama a initMainAnimations()
          // typeof initMainAnimations === 'function' && initMainAnimations();
        }, 800); // debe coincidir con la duración de la transición opacity
      });
    })();
  </script>

</body>
</html>
