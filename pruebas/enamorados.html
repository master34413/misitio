        </svg>`;

        // Usamos el SVGLoader para leer los trazados
        const loader = new SVGLoader();
        const svgData = loader.parse(svgString);
        let allPathPoints = [];

        // Extraemos todos los puntos de todas las líneas del SVG
        for (const path of svgData.paths) {
            const shapes = SVGLoader.createShapes(path);
            for (const shape of shapes) {
                // Obtenemos muchos puntos a lo largo de cada trazado
                const points = shape.getSpacedPoints(400);
                allPathPoints = allPathPoints.concat(points);
            }
        }

        // --- 4. GEOMETRÍA DE PARTÍCULAS ---
        const particleCount = 45000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const scales = new Float32Array(particleCount);

        // Variables para centrar y escalar el SVG en la pantalla
        const scaleMultiplier = 0.12;
        const offsetX = 42.5; // Aproximadamente el centro X del SVG
        const offsetY = 108.4; // Aproximadamente el centro Y del SVG

        for (let i = 0; i < particleCount; i++) {
            const i3 = i * 3;
            // Escogemos un punto base aleatorio del trazado del SVG
            const basePoint = allPathPoints[Math.floor(Math.random() * allPathPoints.length)];

            // Añadimos un poco de "ruido" o dispersión para darle grosor y volumen a las líneas
            const scatterX = (Math.random() - 0.5) * 0.5;
            const scatterY = (Math.random() - 0.5) * 0.5;
            const scatterZ = (Math.random() - 0.5) * 2.0; // Dispersión en profundidad

            positions[i3] = (basePoint.x - offsetX) * scaleMultiplier + scatterX;
            // Invertimos la Y porque en SVG crece hacia abajo, pero en WebGL crece hacia arriba
            positions[i3 + 1] = -(basePoint.y - offsetY) * scaleMultiplier + scatterY;
            positions[i3 + 2] = scatterZ;

            scales[i] = Math.random();
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));

        // --- 5. SHADERS (Con Reacción en el Eje Z) ---
        const material = new THREE.ShaderMaterial({
            uniforms: {
                uTime: { value: 0.0 },
                uColor: { value: new THREE.Color('#ff2a6d') }, // Un color más romántico (rosa/rojo neón)
                uMouse: { value: new THREE.Vector2(0, 0) }
            },
            vertexShader: `
                uniform float uTime;
                uniform vec2 uMouse;
                attribute float aScale;
                varying float vElevation;

                void main() {
                    vec3 pos = position;

                    // Olas base: Ahora distorsionamos la Z (profundidad) en lugar de Y
                    // para no romper la forma del dibujo frontal
                    float elevation = sin(pos.x * 2.0 + uTime * 1.5) * 0.2;
                    elevation += cos(pos.y * 2.0 + uTime * 1.5) * 0.2;

                    // --- EFECTO MÁGICO DEL MOUSE ---
                    // Mapeamos el mouse a la escala del dibujo
                    vec2 mappedMouse = vec2(uMouse.x * 15.0, uMouse.y * 15.0); 
                    float mouseDistance = distance(pos.xy, mappedMouse);
                    
                    // Las partículas "saltan" hacia la cámara cuando pasa el mouse
                    float magicLift = exp(-mouseDistance * 0.8) * 4.0; 
                    
                    pos.z += elevation + magicLift; 
                    vElevation = elevation + magicLift; 

                    vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
                    
                    // Tamaño ajustado para que se defina mejor el dibujo
                    gl_PointSize = 18.0 * aScale * (1.0 / -mvPosition.z); 
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform vec3 uColor;
                varying float vElevation;

                void main() {
                    vec2 cxy = 2.0 * gl_PointCoord - 1.0;
                    float distanceToCenter = length(cxy);
                    
                    if (distanceToCenter > 1.0) discard;

                    float alpha = 1.0 - distanceToCenter;
                    alpha = pow(alpha, 1.8); 

                    // Las partículas se iluminan intensamente de blanco al saltar
                    float intensity = 0.4 + (vElevation * 0.4);
                    vec3 finalColor = mix(uColor, vec3(1.0, 1.0, 1.0), vElevation * 0.2);

                    gl_FragColor = vec4(finalColor * intensity, alpha * 0.9);
                }
            `,
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- 6. POST-PROCESAMIENTO (Bloom) ---
        const composer = new EffectComposer(renderer);
        const renderPass = new RenderPass(scene, camera);
        composer.addPass(renderPass);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 2.2, 0.4, 0.1);
        composer.addPass(bloomPass);

        // --- 7. ANIMACIÓN ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            material.uniforms.uTime.value = elapsedTime;

            // Interpolación fluida del mouse
            mouse.x += (targetMouse.x - mouse.x) * 0.08;
            mouse.y += (targetMouse.y - mouse.y) * 0.08;

            material.uniforms.uMouse.value.set(mouse.x, mouse.y);

            // Efecto Parallax en la cámara
            camera.position.x += (mouse.x * 2 - camera.position.x) * 0.02;
            camera.position.y += (mouse.y * 2 - camera.position.y) * 0.02;
            camera.lookAt(0, 0, 0);

            composer.render();
        }

        animate();

        window.addEventListener('resize', () => {
            windowHalf.set(window.innerWidth / 2, window.innerHeight / 2);
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
