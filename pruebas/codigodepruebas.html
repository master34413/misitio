<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sombra Real Interactiva con Mouse - Three.js</title>
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Playfair Display', serif;
            background-color: #d99c7a;
            /* Color de fondo base */
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            pointer-events: none;
        }

        h1 {
            color: #ffffff;
            font-size: 4rem;
            line-height: 1.2;
            max-width: 800px;
            font-weight: 400;
            /* Pequeña sombra de texto para mayor legibilidad sobre el fondo */
            text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.15);
        }

        em {
            font-style: italic;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&display=swap"
        rel="stylesheet">
</head>

<body>

    <div id="canvas-container"></div>

    <div class="hero-content">
        <h1>Tu boda merece una<br>invitación que se sienta <em>tan<br>especial como el gran día.</em></h1>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Configuración básica de Three.js
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });

        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        // Objeto para rastrear el ratón
        const mouse = new THREE.Vector2(0, 0);

        // 2. Shaders (GLSL)
        const vertexShader = `
            varying vec2 vUv;
            void main() {
                vUv = uv;
                gl_Position = vec4(position, 1.0);
            }
        `;

        const fragmentShader = `
            varying vec2 vUv;
            uniform float u_time;
            uniform vec2 u_resolution;
            uniform vec2 u_mouse; // Uniform para la posición del ratón

            vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec2 mod289(vec2 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
            vec3 permute(vec3 x) { return mod289(((x*34.0)+1.0)*x); }

            float snoise(vec2 v) {
                const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
                vec2 i  = floor(v + dot(v, C.yy) );
                vec2 x0 = v -   i + dot(i, C.xx);
                vec2 i1;
                i1 = (x0.x > x0.y) ? vec2(1.0, 0.0) : vec2(0.0, 1.0);
                vec4 x12 = x0.xyxy + C.xxzz;
                x12.xy -= i1;
                i = mod289(i);
                vec3 p = permute( permute( i.y + vec3(0.0, i1.y, 1.0 )) + i.x + vec3(0.0, i1.x, 1.0 ));
                vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
                m = m*m ;
                m = m*m ;
                vec3 x = 2.0 * fract(p * C.www) - 1.0;
                vec3 h = abs(x) - 0.5;
                vec3 ox = floor(x + 0.5);
                vec3 a0 = x - ox;
                m *= 1.79284291400159 - 0.85373472095314 * ( a0*a0 + h*h );
                vec3 g;
                g.x  = a0.x  * x0.x  + h.x  * x0.y;
                g.yz = a0.yz * x12.xz + h.yz * x12.yw;
                return 130.0 * dot(m, g);
            }

            void main() {
                vec2 uv = vUv;
                uv.x *= u_resolution.x / u_resolution.y;

                // Animación lenta del viento
                float time = u_time * 0.15;

                // --- INTERACTIVIDAD DEL RATÓN ---
                // Desplazamos las UVs del ruido basándonos en la posición del ratón.
                // Usamos un factor de multiplicación (0.05) para un efecto sutil y elegante.
                vec2 mouseOffset = u_mouse * 0.05;
                vec2 noiseUv = uv * vec2(2.5, 4.0) + mouseOffset; 

                // Movimiento continuo del viento
                noiseUv.x += time;
                noiseUv.y += time * 0.5;

                float noiseVal = snoise(noiseUv) * 0.5 + snoise(noiseUv * 2.0) * 0.25;
                
                // Suavizado del borde de la sombra
                float shadowIntensity = smoothstep(-0.2, 0.4, noiseVal);

                // --- COLORES INVERTIDOS PARA SOMBRA REAL ---
                // El fondo base (la zona de "luz")
                vec3 colorLight = vec3(0.85, 0.61, 0.48); // Tono melocotón/arena (#d99c7a)
                // La sombra (una versión más oscura y opaca del fondo)
                vec3 colorShadow = vec3(0.4, 0.25, 0.15); // Sombra profunda y cálida

                // Mezclamos, pero ahora el ruido determina dónde está la sombra oscura.
                vec3 finalColor = mix(colorLight, colorShadow, shadowIntensity);

                // Añadir Grano (Film Grain)
                float grain = fract(sin(dot(vUv, vec2(12.9898, 78.233))) * 43758.5453);
                finalColor -= grain * 0.03; // Intensidad del grano

                gl_FragColor = vec4(finalColor, 1.0);
            }
        `;

        // 3. Crear el material y la malla
        const material = new THREE.ShaderMaterial({
            vertexShader,
            fragmentShader,
            uniforms: {
                u_time: { value: 0.0 },
                u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                u_mouse: { value: mouse } // Pasamos el uniform del ratón
            }
        });

        const geometry = new THREE.PlaneGeometry(2, 2);
        const plane = new THREE.Mesh(geometry, material);
        scene.add(plane);

        // 4. Bucle de animación y eventos
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            material.uniforms.u_time.value = clock.getElapsedTime();
            // Actualizamos el uniform del ratón en cada frame
            material.uniforms.u_mouse.value.lerp(mouse, 0.1); // Usamos 'lerp' para un movimiento suave
            renderer.render(scene, camera);
        }

        // Manejar el redimensionamiento de la ventana
        window.addEventListener('resize', () => {
            renderer.setSize(window.innerWidth, window.innerHeight);
            material.uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
        });

        // --- CAPTURAR EL MOVIMIENTO DEL RATÓN ---
        window.addEventListener('mousemove', (event) => {
            // Normalizamos las coordenadas del ratón de -1 a +1
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
        });

        // Iniciar
        animate();
    </script>
</body>

</html>
