<style>
    body {
        margin: 0;
        overflow: hidden;
        background-color: #050505;
    }

    canvas {
        display: block;
    }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
    // 1. CONFIGURACIÓN BÁSICA
    const scene = new THREE.Scene();
    // Añadimos niebla para que las partículas se pierdan en el horizonte
    scene.fog = new THREE.FogExp2(0x050505, 0.03);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 3, 10);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    // 2. LA GEOMETRÍA (40,000 partículas)
    const particleCount = 40000;
    const geometry = new THREE.BufferGeometry();
    const positions = new Float32Array(particleCount * 3);
    const scales = new Float32Array(particleCount);

    for (let i = 0; i < particleCount; i++) {
        const i3 = i * 3;
        positions[i3] = (Math.random() - 0.5) * 35;     // X
        positions[i3 + 1] = 0.0;                        // Y
        positions[i3 + 2] = (Math.random() - 0.5) * 35; // Z
        scales[i] = Math.random();
    }

    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('aScale', new THREE.BufferAttribute(scales, 1));

    // 3. LOS SHADERS (Matemáticas + Resplandor Simulado)
    const material = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0.0 },
            uColor: { value: new THREE.Color('#ffb03a') } // Dorado premium
        },
        vertexShader: `
      uniform float uTime;
      attribute float aScale;
      varying float vElevation;

      void main() {
        vec3 pos = position;

        // Ecuación de las olas
        float elevation = sin(pos.x * 0.5 + uTime * 0.5) * 0.7;
        elevation += cos(pos.z * 0.5 + uTime * 0.5) * 0.7;
        pos.y += elevation;
        vElevation = elevation; 

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        
        // Efecto de profundidad (lente fotográfico)
        gl_PointSize = 25.0 * aScale * (1.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
        fragmentShader: `
      uniform vec3 uColor;
      varying float vElevation;

      void main() {
        // Hacemos el punto redondo
        vec2 cxy = 2.0 * gl_PointCoord - 1.0;
        float dist = length(cxy);
        if (dist > 1.0) discard;

        // Simulamos el efecto "Bloom" matemáticamente sin usar Post-Processing
        // Concentramos la luz en el centro y la difuminamos agresivamente hacia los bordes
        float glow = exp(-dist * 3.0); 

        // Las olas más altas brillan un poco más
        float intensity = 0.6 + (vElevation * 0.4);

        gl_FragColor = vec4(uColor * intensity, glow);
      }
    `,
        transparent: true,
        blending: THREE.AdditiveBlending, // Fundamental: suma la luz de las partículas superpuestas
        depthWrite: false
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // 4. ANIMACIÓN
    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const elapsedTime = clock.getElapsedTime();

        // Actualizamos el tiempo en el shader
        material.uniforms.uTime.value = elapsedTime;

        // Rotación muy sutil para dar vida
        particles.rotation.y = elapsedTime * 0.03;

        renderer.render(scene, camera);
    }

    animate();

    // 5. RESPONSIVO
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
